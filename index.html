<!DOCTYPE html>
<html>
<head>
  <title>Firebase Form</title>
</head>
<body>

<h2>Форма</h2>

<input type="text" id="name" placeholder="Имя"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<button onclick="sendData()">Отправить</button>

<script type="module">
  // Импорт Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ВСТАВЬ СЮДА СВОЙ firebaseConfig
const firebaseConfig = {
  apiKey: "AIzaSyAtWY1JIDtz3K_v6LXc9wC0LNUBCNogtHE",
  authDomain: "my-web-app-588e6.firebaseapp.com",
  projectId: "my-web-app-588e6",
  storageBucket: "my-web-app-588e6.firebasestorage.app",
  messagingSenderId: "39902341200",
  appId: "1:39902341200:web:f16f03d89972a8ad498955",
  measurementId: "G-58GWD75CHN"
};

  // Инициализация
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Функция отправки
  window.sendData = async function() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    try {
      await addDoc(collection(db, "requests"), {
        name: name,
        email: email
      });
      alert("Данные отправлены!");
    } catch (e) {
      console.error("Ошибка: ", e);
    }
  };
</script>

</body>
</html>
